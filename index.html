<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KOSAME Gallery</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kosame: {
              bg: '#fffcf5',
              blue: '#cceaff',
              bluedark: '#8cc6ff',
              brown: '#c68a69',
              browndark: '#9c6242',
              yellow: '#ffdf73',
              pink: '#ffd1dc',
              cream: '#fdf4e1'
            }
          },
          fontFamily: {
            sans: ['Mali', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body { 
      background-color: #fffcf5; 
      font-family: 'Mali', cursive, sans-serif; 
      color: #c68a69; 
      overflow-x: hidden; 
    }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }
    .animate-pop { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    /* Stripe Pattern Header & Footer */
    .striped-header-footer {
      background-image: linear-gradient(-45deg, #cceaff 25%, #e5f4ff 25%, #e5f4ff 50%, #cceaff 50%, #cceaff 75%, #e5f4ff 75%, #e5f4ff 100%);
      background-size: 40px 40px;
      animation: moveStripes 2s linear infinite;
      border-bottom: 4px solid #fdf4e1;
    }
    @keyframes moveStripes {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }

    /* Animation สำหรับดาวกระพริบวิ้งค์ๆ */
    @keyframes twinkleStar {
      0%, 100% { opacity: 0.2; transform: scale(0.6); }
      50% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 4px rgba(255, 223, 115, 0.8)); }
    }
    .star { position: absolute; pointer-events: none; animation: twinkleStar linear infinite; z-index: 0; }

    /* Kosame Card Style */
    .kosame-card {
      background-color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border: 2px solid #cceaff;
      border-radius: 1.5rem;
      box-shadow: 0 4px 0 0 #cceaff;
      transition: all 0.3s;
    }
  </style>
</head>
<body class="selection:bg-kosame-yellow/50 selection:text-kosame-browndark">
  <div id="root" class="w-full"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbytobmF1mXqlyvVrXxbZilcvQpYD4cNxTLAUMsbbO6Eq3PlD0GBqBQWRKrahCZC7umL/exec";

    const Icon = ({ name, size = 24, className = "" }) => {
      const icons = {
        User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
        Sticker: <><path d="M15.5 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"/><path d="M15 3v6h6"/></>,
        Facebook: <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>,
        Smile: <><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></>,
        Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
        MoreHorizontal: <><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>,
        LayoutGrid: <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>,
        ArrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>,
        Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
        Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
        Unlock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>,
        X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
        Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
        ImageIcon: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>,
        ShieldAlert: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
        Key: <><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></>,
        ChevronLeft: <path d="m15 18-6-6 6-6"/>,
        ChevronRight: <path d="m9 18 6-6-6-6"/>,
        Loader: <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name] || <circle cx="12" cy="12" r="10" />}
        </svg>
      );
    };

    const SkyBackground = () => {
      const SparkleIcon = ({ color, size }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={color} xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L14.64 9.36L22 12L14.64 14.64L12 22L9.36 14.64L2 12L9.36 9.36L12 2Z" />
        </svg>
      );
      const stars = Array.from({ length: 25 }).map((_, i) => {
        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const size = 12 + Math.random() * 18;
        const animDuration = 3 + Math.random() * 4;
        const animDelay = Math.random() * 5;
        const colors = ['#ffdf73', '#ffd1dc', '#ffffff'];
        return (
          <div key={`star-${i}`} className="star" style={{ left: `${left}vw`, top: `${top}vh`, animationDuration: `${animDuration}s`, animationDelay: `${animDelay}s` }}>
            <SparkleIcon color={colors[i % colors.length]} size={size} />
          </div>
        );
      });
      return <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">{stars}</div>;
    };

    const App = () => {
      const [view, setView] = useState('home'); 
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [showAddModal, setShowAddModal] = useState(false);
      const [selectedImageIndex, setSelectedImageIndex] = useState(null);
      const [isLightBoxOpen, setIsLightBoxOpen] = useState(false);
      const [works, setWorks] = useState([]);
      const [loading, setLoading] = useState(true);
      const [passwordInput, setPasswordInput] = useState('');
      const [newWork, setNewWork] = useState({ title: '', category: 'chibi' });
      const [file, setFile] = useState(null);
      const [isUploading, setIsUploading] = useState(false);

      const ADMIN_PASSWORD = "1234";

      const categories = [
        { id: 'profile', label: 'Profile', icon: 'User' },
        { id: 'emote', label: 'Emote', icon: 'Sticker' },
        { id: 'fb-sticker', label: 'FB Sticker', icon: 'Facebook' },
        { id: 'chibi', label: 'Chibi', icon: 'Smile' },
        { id: 'badges', label: 'Sub Badges', icon: 'Trophy' },
        { id: 'etc', label: 'ETC.', icon: 'MoreHorizontal' },
      ];

      const fetchWorksData = async () => {
        setLoading(true);
        try {
            const response = await fetch(`${GAS_WEB_APP_URL}?action=getData`);
            const data = await response.json();
            setWorks(data || []);
        } catch (error) {
            console.error("Fetch error:", error);
            setWorks([]);
        } finally {
            setLoading(false);
        }
      };

      useEffect(() => {
        fetchWorksData();
      }, []);

      const safeWorks = Array.isArray(works) ? works : [];
      const currentDisplayWorks = selectedCategory 
        ? safeWorks.filter(work => work.category === selectedCategory.id)
        : safeWorks.slice(0, 9);

      const handleCategoryClick = (category) => {
        setSelectedCategory(category);
        setView('category');
        window.scrollTo(0, 0);
      };

      const handleBack = () => {
        setView('home');
        setSelectedCategory(null);
      };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        if (passwordInput === ADMIN_PASSWORD) {
          setIsAdmin(true); setView('home'); setPasswordInput('');
        } else {
          alert("รหัสผ่านไม่ถูกต้อง!");
        }
      };

      const handleAddWork = async (e) => {
        e.preventDefault();
        if (!file || !newWork.title) return alert("กรุณาใส่ข้อมูลให้ครบถ้วน");
        setIsUploading(true);

        const reader = new FileReader();
        reader.onloadend = async function(e) {
            const payload = {
                action: 'uploadFile',
                base64: e.target.result.split(',')[1],
                mimeType: file.type,
                filename: file.name,
                title: newWork.title,
                category: newWork.category
            };

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                const res = await response.json();
                
                if(res.success) {
                    alert("อัปโหลดเสร็จสิ้น 🎉");
                    fetchWorksData();
                    setShowAddModal(false); setFile(null); setNewWork({title:'', category:'chibi'});
                } else {
                    alert("Error: " + res.error);
                }
            } catch (error) {
                console.error("Upload error:", error);
                alert("อัปโหลดไม่สำเร็จ ลองใหม่อีกครั้ง");
            } finally {
                setIsUploading(false);
            }
        };
        reader.readAsDataURL(file);
      };

      const openLightBox = (index) => {
        setSelectedImageIndex(index);
        setIsLightBoxOpen(true);
      };
      
      const closeLightBox = () => {
        setIsLightBoxOpen(false);
        setSelectedImageIndex(null);
      };
      
      const nextImage = (e) => {
        e?.stopPropagation();
        if (currentDisplayWorks.length > 0) {
            setSelectedImageIndex((prev) => (prev + 1) % currentDisplayWorks.length);
        }
      };
      
      const prevImage = (e) => {
        e?.stopPropagation();
        if (currentDisplayWorks.length > 0) {
            setSelectedImageIndex((prev) => (prev - 1 + currentDisplayWorks.length) % currentDisplayWorks.length);
        }
      };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (!isLightBoxOpen) return;
          if (e.key === 'ArrowRight') nextImage();
          if (e.key === 'ArrowLeft') prevImage();
          if (e.key === 'Escape') closeLightBox();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [isLightBoxOpen, selectedImageIndex, currentDisplayWorks]);

      return (
        <div className="min-h-screen pb-32 max-w-md mx-auto relative pt-10 px-5 flex flex-col text-kosame-brown">
            
            <SkyBackground />
            <div className="h-6 w-full striped-header-footer fixed top-0 left-0 z-20 shadow-sm"></div>

            <div className="relative z-10 w-full flex-grow">
                
                {/* LOGIN VIEW */}
                {view === 'login' && (
                    <div className="min-h-[60vh] flex flex-col items-center justify-center animate-pop">
                        <div className="kosame-card w-full max-w-xs p-8 text-center relative mt-8">
                            <button onClick={handleBack} className="absolute top-4 right-4 text-kosame-brown hover:text-kosame-browndark bg-kosame-cream rounded-full p-1"><Icon name="X" size={16}/></button>
                            <div className="w-16 h-16 bg-kosame-yellow rounded-full flex items-center justify-center text-white mb-4 mx-auto"><Icon name="Key" size={32} /></div>
                            <h2 className="text-xl font-bold text-kosame-browndark mb-2">Admin Login</h2>
                            <p className="text-xs text-kosame-brown mb-6">กรุณาใส่รหัสผ่านเพื่อจัดการ Gallery</p>
                            
                            <form onSubmit={handleLoginSubmit} className="space-y-4">
                                <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder="รหัสผ่าน" className="w-full bg-kosame-bg border-2 border-kosame-cream rounded-xl py-3 text-center text-kosame-browndark tracking-[0.2em] focus:border-kosame-blue focus:outline-none" autoFocus />
                                <button type="submit" className="w-full bg-kosame-blue hover:bg-kosame-bluedark text-white font-bold py-3 rounded-xl transition-all text-sm shadow-sm">เข้าสู่ระบบ</button>
                            </form>
                        </div>
                    </div>
                )}

                {/* HOME & CATEGORY VIEW */}
                {(view === 'home' || view === 'category') && (
                    <div className="animate-fade-in mt-4">
                        
                        {/* Header */}
                        <header className="mb-8 flex flex-col items-center text-center">
                            <div className="w-24 h-24 bg-white rounded-full border-4 border-kosame-blue overflow-hidden shadow-md mb-3">
                                <img src="https://i.pinimg.com/736x/21/df/b6/21dfb607ea0ba0df850f83dd71752b02.jpg" className="w-full h-full object-cover" alt="Kosame" />
                            </div>
                            <h1 className="text-3xl font-bold text-kosame-browndark tracking-wide">Kosame</h1>
                            <div className="mt-1 bg-kosame-cream px-4 py-1 rounded-full text-xs font-bold text-kosame-brown border border-white shadow-sm inline-flex items-center gap-1">
                                PORTFOLIO ✧.*
                                {isAdmin && <span className="ml-1 text-[9px] bg-kosame-yellow text-white px-1.5 py-0.5 rounded">ADMIN</span>}
                            </div>
                        </header>

                        {/* Category Grid (Home) */}
                        {view === 'home' && (
                            <section className="mb-8">
                                <div className="flex items-center justify-center gap-2 mb-4">
                                    <div className="h-[2px] w-12 bg-kosame-blue/50 rounded-full"></div>
                                    <span className="text-xs font-bold text-kosame-blue uppercase tracking-widest px-2">Categories</span>
                                    <div className="h-[2px] w-12 bg-kosame-blue/50 rounded-full"></div>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-3">
                                    {categories.map(cat => (
                                        <button key={cat.id} onClick={()=>handleCategoryClick(cat)} className="group kosame-card flex items-center gap-3 p-3 hover:bg-kosame-yellow hover:border-kosame-yellow transition-colors hover:-translate-y-1">
                                            <div className="bg-kosame-cream text-kosame-blue group-hover:bg-white group-hover:text-kosame-yellow p-2 rounded-xl transition-colors">
                                                <Icon name={cat.icon} size={20}/>
                                            </div>
                                            <span className="font-bold text-sm text-kosame-browndark group-hover:text-white transition-colors">{cat.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* Category Title (Category View) */}
                        {view === 'category' && (
                            <div className="mb-6 flex justify-between items-center bg-white/80 backdrop-blur-sm p-4 rounded-2xl border-2 border-kosame-cream shadow-sm">
                                <div>
                                    <h2 className="text-xl font-bold text-kosame-browndark flex items-center gap-2">
                                        <div className="bg-kosame-yellow p-1.5 rounded-lg text-white">
                                            <Icon name={selectedCategory?.icon} size={16}/>
                                        </div>
                                        {selectedCategory?.label}
                                    </h2>
                                </div>
                                <div className="text-center bg-kosame-cream px-3 py-1 rounded-xl">
                                    <span className="text-lg font-bold text-kosame-blue leading-none">{currentDisplayWorks.length}</span>
                                    <span className="text-[10px] text-kosame-brown block font-bold">ผลงาน</span>
                                </div>
                            </div>
                        )}

                        {/* Gallery Grid */}
                        <section>
                            <div className="flex justify-center mb-4">
                                 <span className="bg-kosame-yellow text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-sm">
                                    {view === 'home' ? 'ผลงานล่าสุด' : `ผลงาน ${selectedCategory?.label}`}
                                 </span>
                            </div>

                            {loading ? (
                                <div className="py-12 flex flex-col items-center justify-center gap-3">
                                    <div className="w-8 h-8 border-4 border-kosame-blue border-t-kosame-yellow rounded-full animate-spin"></div>
                                    <span className="text-xs font-bold text-kosame-brown">กำลังโหลดรูปภาพ...</span>
                                </div>
                            ) : (
                                <div className="grid grid-cols-3 gap-2">
                                    {currentDisplayWorks.length > 0 ? currentDisplayWorks.map((work, index) => (
                                        <div key={work.id} onClick={()=>openLightBox(index)} className="group relative aspect-square bg-white rounded-xl border-2 border-kosame-cream shadow-sm cursor-pointer overflow-hidden hover:border-kosame-blue transition duration-300">
                                            <img src={work.img} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" loading="lazy" alt={work.title} />
                                            {/* Hover overlay */}
                                            <div className="absolute inset-0 bg-kosame-blue/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px]">
                                                <span className="text-[10px] font-bold text-white text-center px-1 drop-shadow-md truncate w-full">{work.title}</span>
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="col-span-3 text-center py-12 bg-white/50 border-2 border-dashed border-kosame-cream rounded-2xl">
                                            <p className="text-sm font-bold text-kosame-brown">ยังไม่มีผลงานในหมวดหมู่นี้จ้า 🎨</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </section>
                    </div>
                )}
            </div>

            {/* --- LIGHTBOX --- */}
            {isLightBoxOpen && selectedImageIndex !== null && currentDisplayWorks[selectedImageIndex] && (
                <div className="fixed inset-0 z-[100] bg-kosame-bg/95 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in" onClick={closeLightBox}>
                    <div className="absolute top-0 w-full p-4 flex justify-between items-start z-20">
                        <div className="bg-white/80 backdrop-blur px-4 py-2 rounded-2xl border-2 border-kosame-cream shadow-sm">
                            <h3 className="text-sm font-bold text-kosame-browndark">{currentDisplayWorks[selectedImageIndex].title}</h3>
                            <p className="text-[10px] text-kosame-blue font-bold">{categories.find(c => c.id === currentDisplayWorks[selectedImageIndex].category)?.label || 'Gallery'}</p>
                        </div>
                        <button onClick={closeLightBox} className="p-2 bg-kosame-cream text-kosame-brown hover:bg-kosame-yellow hover:text-white rounded-full transition-colors shadow-sm border border-white">
                          <Icon name="X" size={20}/>
                        </button>
                    </div>

                    <div className="relative w-full flex items-center justify-center h-full px-4" onClick={e => e.stopPropagation()}>
                        {/* Navigation Arrows */}
                        <button onClick={prevImage} className="absolute left-2 z-30 p-2 bg-white/80 text-kosame-blue rounded-full shadow-md hover:text-kosame-yellow"><Icon name="ChevronLeft" size={24}/></button>
                        
                        <div className="relative kosame-card p-2 bg-white max-w-full">
                            <img src={currentDisplayWorks[selectedImageIndex].img} className="max-w-full max-h-[70vh] object-contain rounded-xl" alt="Artwork" />
                        </div>
                        
                        <button onClick={nextImage} className="absolute right-2 z-30 p-2 bg-white/80 text-kosame-blue rounded-full shadow-md hover:text-kosame-yellow"><Icon name="ChevronRight" size={24}/></button>
                    </div>
                    
                    {/* Dots indicator */}
                    <div className="absolute bottom-8 w-full px-8 flex gap-1.5 justify-center pointer-events-none flex-wrap">
                        {currentDisplayWorks.map((_, i) => (
                            <div key={i} className={`h-1.5 rounded-full transition-all duration-300 ${i === selectedImageIndex ? 'w-6 bg-kosame-yellow' : 'w-1.5 bg-kosame-blue/30'}`}></div>
                        ))}
                    </div>
                </div>
            )}

            {/* --- UPLOAD MODAL (ADMIN) --- */}
            {showAddModal && (
                <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-sm kosame-card animate-slide-up relative">
                        <button onClick={()=>setShowAddModal(false)} className="absolute top-4 right-4 text-kosame-brown bg-kosame-cream rounded-full p-1 hover:bg-kosame-yellow hover:text-white transition-colors"><Icon name="X" size={16}/></button>
                        <div className="p-5 border-b-2 border-kosame-cream">
                            <h4 className="text-lg font-bold text-kosame-browndark flex items-center gap-2">
                                <div className="bg-kosame-blue p-1.5 rounded-lg text-white"><Icon name="Upload" size={18}/></div>
                                เพิ่มผลงานใหม่
                            </h4>
                        </div>
                        <form onSubmit={handleAddWork} className="p-5 space-y-4">
                            <div>
                                <label className="text-xs font-bold text-kosame-browndark block mb-1.5">ชื่อผลงาน (Title)</label>
                                <input type="text" value={newWork.title} onChange={e=>setNewWork({...newWork, title: e.target.value})} className="w-full bg-kosame-bg border-2 border-kosame-cream focus:border-kosame-blue rounded-xl p-3 text-sm text-kosame-browndark outline-none" placeholder="เช่น น้องแมว Chibi"/>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-kosame-browndark block mb-1.5">หมวดหมู่ (Category)</label>
                                <select value={newWork.category} onChange={e=>setNewWork({...newWork, category: e.target.value})} className="w-full bg-kosame-bg border-2 border-kosame-cream focus:border-kosame-blue rounded-xl p-3 text-sm text-kosame-browndark outline-none appearance-none">
                                    {categories.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                </select>
                            </div>
                            <div className="border-2 border-dashed border-kosame-blue bg-kosame-bg/50 rounded-xl p-6 hover:bg-kosame-blue/5 transition cursor-pointer relative text-center">
                                <input type="file" onChange={e=>setFile(e.target.files[0])} accept="image/*" className="absolute inset-0 opacity-0 w-full h-full cursor-pointer"/>
                                <div className="bg-white w-12 h-12 rounded-full flex items-center justify-center mx-auto text-kosame-blue mb-2 shadow-sm">
                                    <Icon name="ImageIcon" size={24}/>
                                </div>
                                <p className="text-xs font-bold text-kosame-browndark">{file ? file.name : "คลิกเพื่อเลือก หรือลากไฟล์มาวาง"}</p>
                                <p className="text-[10px] text-kosame-brown mt-1">รองรับ JPG, PNG</p>
                            </div>
                            <button type="submit" disabled={isUploading} className="w-full py-3 bg-kosame-yellow hover:bg-[#ebd453] text-white font-bold text-sm rounded-xl transition shadow-sm disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2">
                                {isUploading ? <><Icon name="Loader" className="animate-spin" size={16}/> กำลังอัปโหลด...</> : "อัปโหลดรูปภาพ"}
                            </button>
                        </form>
                    </div>
                </div>
            )}

            {/* FOOTER NAV */}
            <div className="h-6 w-full striped-header-footer fixed bottom-0 left-0 z-20 border-t-4 border-kosame-cream border-b-0 shadow-[0_-2px_4px_rgba(0,0,0,0.02)]"></div>
            
            <footer className="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur-xl border-2 border-kosame-blue shadow-[0_4px_0_0_#cceaff] rounded-full px-6 py-2 flex items-center justify-around w-[85%] max-w-[320px] z-40">
                 <button onClick={() => window.location.href = 'index.html'} className={`flex flex-col items-center gap-1 transition-all text-kosame-brown hover:text-kosame-yellow`}>
                    <div className={`p-2 rounded-full transition-all`}><Icon name="ArrowLeft" size={22} /></div>
                 </button>
                 <button onClick={handleBack} className={`flex flex-col items-center gap-1 transition-all ${view === 'home' ? 'text-kosame-yellow scale-110' : 'text-kosame-brown hover:text-kosame-yellow'}`}>
                    <div className={`${view === 'home' ? 'bg-kosame-cream p-2' : 'p-2'} rounded-full transition-all`}><Icon name="LayoutGrid" size={22} /></div>
                 </button>
                 
                 {isAdmin && (
                    <button onClick={()=>setShowAddModal(true)} className="transform -translate-y-4 bg-kosame-yellow text-white p-3 rounded-full border-4 border-white shadow-md hover:scale-105 transition-transform">
                        <Icon name="Plus" size={20}/>
                    </button>
                 )}

                 <button onClick={()=>isAdmin ? setIsAdmin(false) : setView('login')} className={`flex flex-col items-center gap-1 transition-all ${isAdmin ? 'text-kosame-yellow scale-110' : 'text-kosame-brown hover:text-kosame-yellow'}`}>
                    <div className={`${isAdmin ? 'bg-kosame-cream p-2' : 'p-2'} rounded-full transition-all`}><Icon name={isAdmin ? "Unlock" : "Lock"} size={22} /></div>
                 </button>
            </footer>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
